services:
  postgres:
    image: postgres:15-alpine
    container_name: agento-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agento_pg
      POSTGRES_PASSWORD: Ag3ntoSaaS2024
      POSTGRES_DB: agento_saas
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agento_pg"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agento-network

  redis:
    image: redis:7-alpine
    container_name: agento-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agento-network

  server:
    build:
      context: ./packages/server
      dockerfile: Dockerfile
    container_name: agento-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://agento_pg:Ag3ntoSaaS2024@postgres:5432/agento_saas
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3001:3001"
    volumes:
      - ./storage:/app/storage
      - ./packages/server/src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - agento-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agento-api.rule=Host(`agento.zx.com.ar`) && (PathPrefix(`/api/`) || PathPrefix(`/health`))"
      - "traefik.http.routers.agento-api.entrypoints=websecure"
      - "traefik.http.routers.agento-api.tls=true"
      - "traefik.http.routers.agento-api.tls.certresolver=cloudflare"
      - "traefik.http.services.agento-api.loadbalancer.server.port=3001"

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: agento-frontend
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: https://agento.zx.com.ar
      NEXT_PUBLIC_APP_URL: https://agento.zx.com.ar
    ports:
      - "3002:3000"
    networks:
      - agento-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agento-web.rule=Host(`agento.zx.com.ar`)"
      - "traefik.http.routers.agento-web.entrypoints=websecure"
      - "traefik.http.routers.agento-web.tls=true"
      - "traefik.http.routers.agento-web.tls.certresolver=cloudflare"
      - "traefik.http.services.agento-web.loadbalancer.server.port=3000"

volumes:
  postgres-data:
  redis-data:

networks:
  agento-network:
    external: true

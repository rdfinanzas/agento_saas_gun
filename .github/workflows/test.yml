name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================
  # Unit Tests (Backend)
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agento_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./packages/server
        run: bun install

      - name: Run unit tests
        working-directory: ./packages/server
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5433/agento_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: bun test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./packages/server/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  # ============================================
  # Integration Tests
  # ============================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agento_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ./packages/server
        run: bun install

      - name: Run integration tests
        working-directory: ./packages/server
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5433/agento_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: bun test src/tests/integration/**/*.test.ts

  # ============================================
  # E2E Tests
  # ============================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    timeout-minutes: 30
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agento_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        working-directory: ./packages/server
        run: bun install

      - name: Install frontend dependencies
        working-directory: ./packages/frontend
        run: npm ci

      - name: Install Playwright
        working-directory: ./tests
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run database migrations
        working-directory: ./packages/server
        env:
          DATABASE_URL: postgresql://test:test@localhost:5433/agento_test
        run: bun run db:migrate

      - name: Run E2E tests
        working-directory: ./tests
        env:
          FRONTEND_URL: http://localhost:3001
          API_URL: http://localhost:3000
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 30

  # ============================================
  # Type Checking
  # ============================================
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        working-directory: ./packages/server
        run: bun install

      - name: Type check server
        working-directory: ./packages/server
        run: bun run typecheck

      - name: Install frontend dependencies
        working-directory: ./packages/frontend
        run: npm ci

      - name: Type check frontend
        working-directory: ./packages/frontend
        run: npm run typecheck || true

  # ============================================
  # Linting
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install server dependencies
        working-directory: ./packages/server
        run: bun install

      - name: Run Biome lint
        working-directory: ./packages/server
        run: bun run lint

  # ============================================
  # Build Test
  # ============================================
  build:
    name: Build Test
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./packages/server
        run: bun install

      - name: Build server
        working-directory: ./packages/server
        run: bun run build

      - name: Install frontend dependencies
        working-directory: ./packages/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./packages/frontend
        run: npm run build || true
